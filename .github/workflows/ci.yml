name: CI

on:
  push:
    branches: [main, "v0.3-readiness"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: Lint (blocking)
        run: ruff check voiceflow/
      - name: Import smoke
        run: python -c "import voiceflow; print(f'✅ voiceflow {voiceflow.__version__} imports on {__import__(\"sys\").version_info[:2]}')"
      - name: Config validation
        run: |
          python -c "
          from voiceflow.config import DEFAULTS, validate_config
          errors = validate_config(DEFAULTS)
          assert errors == [], f'Default config has errors: {errors}'
          print('✅ config defaults valid')
          "
      - name: Tests
        run: pytest -q

  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: pip install build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Twine check
        run: twine check dist/*

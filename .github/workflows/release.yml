name: Release

# Tag-driven release. Push a `v*.*.*` tag → wheel + sdist publish to PyPI
# (via Trusted Publisher OIDC, no token needed) and split arm64/x86_64
# DMGs attach to the GitHub Release. RC tags (e.g. v0.3.0-rc1) skip
# PyPI publish so we can exercise the pipeline without burning the
# version number.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing v* tag to build/upload DMGs for"
        required: true
        type: string

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Gate: tag must match the version stamped in pyproject.toml + __init__
  # ────────────────────────────────────────────────────────────────────
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      version: ${{ steps.classify.outputs.version }}
      release_tag: ${{ steps.classify.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag || github.ref }}
      - id: classify
        name: Verify tag ↔ pyproject ↔ __init__ agree, and classify pre-release
        run: |
          set -euo pipefail
          RAW_TAG="${{ inputs.release_tag || github.ref_name }}"
          TAG="${RAW_TAG#refs/tags/}"
          if [[ "$TAG" != v* ]]; then
            echo "::error::release tag must start with v; got $TAG"
            exit 1
          fi
          # Strip leading 'v' for comparison.
          TAG_VERSION="${TAG#v}"
          # Strip a trailing pre-release suffix (rc1, -alpha2, .dev3, a1, b2)
          # for the equality comparison: the tag carries the pre-release
          # marker, but pyproject + __init__ stay at the base version.
          BASE_VERSION=$(echo "$TAG_VERSION" | python3 -c "import re,sys; print(re.sub(r'([-.]?)(rc|alpha|beta|dev|a|b)\d+\$', '', sys.stdin.read().strip()))")
          PYPROJECT_VERSION=$(python3 -c "import re,sys; m=re.search(r'^version\s*=\s*\"([^\"]+)\"', open('pyproject.toml').read(), re.M); print(m.group(1))")
          INIT_VERSION=$(python3 -c "import re; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('voiceflow/__init__.py').read()); print(m.group(1))")
          echo "tag=$TAG_VERSION (base=$BASE_VERSION) pyproject=$PYPROJECT_VERSION init=$INIT_VERSION"
          if [ "$BASE_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::base version $BASE_VERSION (from tag $TAG_VERSION) != pyproject.toml $PYPROJECT_VERSION"
            exit 1
          fi
          if [ "$BASE_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::base version $BASE_VERSION (from tag $TAG_VERSION) != voiceflow/__init__.py $INIT_VERSION"
            exit 1
          fi
          # Pre-release detection: any suffix ⇒ pre-release.
          if [ "$BASE_VERSION" != "$TAG_VERSION" ]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────
  # Build wheel + sdist; attach to GitHub Release; publish to PyPI on
  # non-pre-release tags only.
  # ────────────────────────────────────────────────────────────────────
  publish-pypi:
    if: github.event_name == 'push'
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for PyPI Trusted Publisher (OIDC)
      contents: write   # Required for the GitHub Release upload
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel + sdist
        run: python -m build
      - name: Twine check
        run: twine check dist/*
      - name: Upload sdist + wheel to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.release_tag }}
          files: dist/*
          prerelease: ${{ needs.verify-version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to PyPI (non-pre-release tags only)
        if: needs.verify-version.outputs.is_prerelease == 'false' && vars.PYPI_TRUSTED_PUBLISHING_ENABLED == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publisher: configure on PyPI side first.
        # https://docs.pypi.org/trusted-publishers/

  # ────────────────────────────────────────────────────────────────────
  # Build and attach DMGs (one arm64, one x86_64) on the same release.
  # ────────────────────────────────────────────────────────────────────
  build-dmg:
    # Sequenced after publish-pypi on tag pushes: two parallel action-gh-release
    # uploads race to create the same release and intermittently fail with a 422.
    needs: [verify-version, publish-pypi]
    if: always() && needs.verify-version.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.publish-pypi.result == 'success')
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD != '' && secrets.APPLE_KEYCHAIN_PASSWORD != '' && secrets.APPLE_NOTARY_KEY_BASE64 != '' && secrets.APPLE_NOTARY_KEY_ID != '' && secrets.APPLE_NOTARY_ISSUER_ID != '' && secrets.APPLE_CODESIGN_IDENTITY != '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify-version.outputs.release_tag }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[all]"
      - name: Prepare Apple Developer ID signing assets
        if: env.HAS_APPLE_SIGNING == 'true'
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/openvoiceflow-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"

          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"

          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          echo "OVF_NOTARY_KEY=$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
      - name: Build DMG
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ "$HAS_APPLE_SIGNING" == "true" ]]; then
            OVF_SIGN_IDENTITY="$APPLE_CODESIGN_IDENTITY" \
            OVF_NOTARIZE=1 \
            OVF_NOTARY_KEY="$OVF_NOTARY_KEY" \
            OVF_NOTARY_KEY_ID="$APPLE_NOTARY_KEY_ID" \
            OVF_NOTARY_ISSUER_ID="$APPLE_NOTARY_ISSUER_ID" \
            bash build-dmg.sh
          else
            echo "::error::Apple signing/notarization secrets are missing; refusing to publish unsigned DMGs."
            exit 1
          fi
      - name: Upload DMGs to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.release_tag }}
          files: dist/*.dmg
          prerelease: ${{ needs.verify-version.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

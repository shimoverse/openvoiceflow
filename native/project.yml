name: OpenVoiceFlow
options:
  bundleIdPrefix: app
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    exactVersion: 0.18.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    exactVersion: 2.9.4
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  OpenVoiceFlow:
    type: application
    platform: macOS
    sources:
      - path: Sources/OpenVoiceFlow
      - path: Resources/OpenVoiceFlow.icns
        buildPhase: resources
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_NAME: OpenVoiceFlow
        PRODUCT_BUNDLE_IDENTIFIER: app.openvoiceflow
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenVoiceFlow.entitlements
        MARKETING_VERSION: 0.4.2
        CURRENT_PROJECT_VERSION: 3
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
schemes:
  OpenVoiceFlow:
    build:
      targets:
        OpenVoiceFlow: all
